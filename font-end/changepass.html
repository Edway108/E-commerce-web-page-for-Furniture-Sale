<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Account Security Settings</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f4f4f4;
        }

        .container {
            width: 700px;
            margin: 50px auto;
            background: #fff;
            padding: 40px 60px;
            border: 1px solid #ccc;
        }

        h1 {
            text-align: center;
            font-size: 22px;
            margin-bottom: 40px;
        }

        .section-title {
            font-weight: bold;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }

        .form-group label {
            width: 180px;
        }

        .form-group input {
            width: 250px;
            padding: 8px;
            border: 1px solid #777;
        }

        .btn {
            display: block;
            margin: 25px auto;
            padding: 10px 25px;
            border-radius: 8px;
            border: 1px solid #777;
            background: #d9e3ef;
            cursor: pointer;
        }

        .btn:hover {
            background: #c8d6e8;
        }

        .btn-2fa {
            background: #cfe6cf;
        }

        .btn-2fa:hover {
            background: #bfe0bf;
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>ACCOUNT SECURITY SETTINGS</h1>

        <div class="section">
            <div class="section-title">Change Password</div>

            <div class="form-group">
                <label>Current Password</label>
                <input type="password">
            </div>

            <div class="form-group">
                <label>New Password</label>
                <input type="password">
            </div>

            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password">
            </div>

            <button class="btn">Update Password</button>

        </div>

        <div class="section">
            <div class="section-title">Enable Two-Factor Authentication</div>

            <button class="btn btn-2fa">Enable 2FA</button>

        </div>

    </div>

</body>

</html>
