<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>User Login</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/png" href="logo.png">
</head>

<body>

    <div class="glass-box">
        <div class="container">

            <h1>USER LOGIN</h1>
            <div class="section-title">Login to Your Account</div>

            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username">
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password">
            </div>
            <button class="login-btn" onclick="login()">Login</button>

            <div class="links">
                <a href="#">Forgot Password?</a>
            </div>

            <div class="links">
                Don't have an account? <a href="register.html">Register</a>
            </div>

        </div>
    </div>
    <script>
        // Removed duplicate declaration of API_BASE

        async function login() {
            const username = document.getElementById("username").value;
            const password = document.getElementById("password").value;

            try {
                const res = await fetch(`http://localhost:8080/auth/login`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ username, password }),
                });

                const data = await res.json();

                if (res.ok) {
                    console.log("LOGIN OK:", data);
                    localStorage.setItem("user", JSON.stringify({ username })); // Lưu user info
                    window.location.href = "mainPage.html"; // Chuyển sang products
                } else {
                    alert(data.message || "Login failed");
                }
            } catch (error) {
                alert("Network error: " + error.message);
            }
        }


    </script>
</body>

</html>
