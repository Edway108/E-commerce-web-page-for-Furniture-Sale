<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>User Login</title>

    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            margin: 0;

            background-color: #f5f5f5;

        }

        .container {
            width: 700px;
            margin: 80px auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 40px;
        }

        .section-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 25px;
        }

        .form-group {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }

        .form-group label {
            width: 140px;
        }

        .form-group input {
            width: 350px;
            padding: 10px;
            border: 2px solid #666;
        }

        .login-btn {
            display: block;
            margin: 30px auto;
            padding: 10px 40px;
            border-radius: 8px;
            border: 1px solid #666;
            background: #cfd8e3;
            cursor: pointer;
        }

        .login-btn:hover {
            background: #bcc9d8;
        }

        .links {
            text-align: center;
            margin-top: 10px;
        }

        .links a {
            color: #3b6ea8;
            text-decoration: none;
        }

        .links a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>USER LOGIN</h1>
        <form method="post" action="http://localhost:8080/auth/login">
            <div class="section-title">Login to Your Account</div>

            <div class="form-group">
                <label>Username</label>
                <input type="text">
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password">
            </div>

            <button class="login-btn">Login</button>

            <div class="links">
                <a href="#">Forgot Password?</a>
            </div>

            <div class="links">
                Don't have an account? <a href="#">Register</a>
            </div>

        </form>
    </div>

</body>

</html>
