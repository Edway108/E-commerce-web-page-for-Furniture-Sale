<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Furnituree</title>

    <link rel="stylesheet" href="styles.css">

</head>

<body>

    <!-- HEADER -->
    <header class="header">
        <div class="header-left">
            <div class="header-logo"><span>Furnituree</span></div>
            <div class="header-line"></div>
            <div class="header-sub">Product Catalog</div>
        </div>
        <button class="btn-add" onclick="openAdd()">+ Add Product</button>
    </header>

    <!-- HERO -->
    <div class="hero">
        <h1>Curated <em>Pieces</em><br />for Every Space</h1>
        <div class="hero-count">
            <strong id="productCount">0</strong>
            Items in Catalog
        </div>
    </div>

    <!-- GRID -->
    <div class="grid-container">
        <div id="loadingState" class="loading">
            <div class="spinner"></div> Loading catalog…
        </div>
        <div id="emptyState" class="empty" style="display:none">
            <h2>No pieces yet</h2>
            <p>Start by adding your first furniture item to the catalog.</p>
        </div>
        <div id="grid" class="grid"></div>
    </div>

    <!-- ADD / EDIT MODAL -->
    <div class="overlay" id="formOverlay" onclick="closeFormModal()">
        <div class="modal" onclick="event.stopPropagation()">
            <div class="modal-header">
                <div>
                    <div class="modal-title" id="formTitle">New Piece</div>
                    <div class="modal-subtitle" id="formSubtitle">Add to catalog</div>
                </div>
                <button class="modal-close" onclick="closeFormModal()">×</button>
            </div>
            <div class="modal-body">
                <div class="field">
                    <label>Product Name</label>
                    <input id="fName" placeholder="e.g. Walnut Coffee Table" />
                </div>
                <div class="form-row">
                    <div class="field">
                        <label>Price (USD)</label>
                        <input id="fPrice" type="number" placeholder="0.00" />
                    </div>
                    <div class="field">
                        <label>Quantity</label>
                        <input id="fQty" type="number" placeholder="0" />
                    </div>
                </div>
                <div class="field">
                    <label>Image URL</label>
                    <input id="fImg" placeholder="https://..." />
                </div>
                <div class="field">
                    <label>Description</label>
                    <textarea id="fDesc" placeholder="Describe this piece…"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-cancel" onclick="closeFormModal()">Cancel</button>
                <button class="btn-save" onclick="handleSave()" id="saveBtn">Add to Catalog</button>
            </div>
        </div>
    </div>

    <!-- VIEW MODAL -->
    <div class="overlay" id="viewOverlay" onclick="closeViewModal()">
        <div class="modal" onclick="event.stopPropagation()">
            <div class="modal-header">
                <div>
                    <div class="modal-title" id="viewName">Product Name</div>
                    <div class="modal-subtitle">Product Details</div>
                </div>
                <button class="modal-close" onclick="closeViewModal()">×</button>
            </div>
            <div id="viewImgWrap"></div>
            <div class="view-body">
                <div class="view-price" id="viewPrice"></div>
                <div class="view-desc" id="viewDesc"></div>
                <div class="view-meta">
                    <div class="view-meta-item"><label>Stock</label><span id="viewQty"></span></div>
                    <div class="view-meta-item"><label>ID</label><span id="viewId"></span></div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-cancel" onclick="closeViewModal()">Close</button>
                <button class="btn-save" onclick="switchToEdit()">Edit This Piece</button>
            </div>
        </div>
    </div>

    <!-- DELETE CONFIRM -->
    <div class="overlay" id="deleteOverlay" onclick="closeDeleteModal()">
        <div class="modal" style="max-width:400px" onclick="event.stopPropagation()">
            <div class="confirm-box">
                <h3>Remove this piece?</h3>
                <p><strong id="deleteName" style="color:var(--walnut)"></strong> will be permanently removed from the
                    catalog.</p>
                <div class="confirm-actions">
                    <button class="btn-cancel" onclick="closeDeleteModal()">Keep It</button>
                    <button class="btn-confirm-del" onclick="confirmDelete()">Yes, Remove</button>
                </div>
            </div>
        </div>
    </div>

    <!-- TOAST -->
    <div class="toast" id="toast"></div>

    <script>
        const API = "http://127.0.0.1:8080/products"; // ← ĐÚNG endpoint
        let editId = null;
        let deleteId = null;
        let viewProduct = null;

        // 🔑 AUTH CHECK + TOKEN HANDLER
        async function checkAuth() {
            const user = localStorage.getItem("user");
            if (!user) {
                alert("Please login first!");
                window.location.href = "login.html";
                return false;
            }
            return true;
        }

        // ── FETCH ALL (với auth) ──────────────────────────────────────
        async function fetchAll() {
            if (!await checkAuth()) return;

            document.getElementById("loadingState").style.display = "flex";
            document.getElementById("grid").innerHTML = "";
            document.getElementById("emptyState").style.display = "none";

            try {
                const res = await fetch(`${API}/findall`, {
                    method: "GET",
                    // ← QUAN TRỌNG: Gửi cookies/session
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('token') || ''}` // Fallback JWT
                    }
                });

                if (res.status === 401) {
                    localStorage.removeItem("user");
                    window.location.href = "login.html";
                    return;
                }

                const data = await res.json();
                console.log("Products loaded:", data.length);
                renderGrid(data);
            } catch (error) {
                console.error("Fetch error:", error);
                showToast("Failed to load products", "error");
            } finally {
                document.getElementById("loadingState").style.display = "none";
            }
        }

        // Các function khác giữ nguyên...
        function renderGrid(products) {
            document.getElementById("productCount").textContent = products.length;
            const grid = document.getElementById("grid");
            if (products.length === 0) {
                document.getElementById("emptyState").style.display = "block";
                return;
            }
            grid.innerHTML = products.map(p => `
            <div class="card">
                ${p.img ? `<img src="${p.img}" class="card-img" onclick='openView(${JSON.stringify(p)})'>` :
                    `<div class="card-img-placeholder" onclick='openView(${JSON.stringify(p)})'><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><rect x="3" y="10" width="18" height="8" rx="1"/><rect x="6" y="6" width="12" height="4" rx="1"/><line x1="7" y1="18" x2="7" y2="21"/><line x1="17" y1="18" x2="17" y2="21"/></svg><span>No Image</span></div>`
                }
                <div class="card-body">
                    <div class="card-tag">Furniture</div>
                    <div class="card-name" onclick='openView(${JSON.stringify(p)})'>${p.product_name}</div>
                    <div class="card-desc">${p.description || "No description available."}</div>
                    <div class="card-footer">
                        <div class="card-price"><span>$</span>${Number(p.price).toLocaleString("en-US", { minimumFractionDigits: 2 })}</div>
                        <div class="card-qty">Qty: ${p.quantity}</div>
                    </div>
                    <div class="card-actions">
                        <button class="btn-icon btn-edit" onclick='openEdit(${JSON.stringify(p)})'>Edit</button>
                        <button class="btn-icon btn-delete" onclick='openDelete(${p.id}, "${p.product_name}")'>Remove</button>
                    </div>
                </div>
            </div>
        `).join("");
        }

        // ── SAVE (với auth) ───────────────────────────────────────────
        async function handleSave() {
            if (!await checkAuth()) return;

            const payload = {
                product_name: document.getElementById("fName").value,
                price: parseFloat(document.getElementById("fPrice").value),
                quantity: parseInt(document.getElementById("fQty").value),
                img: document.getElementById("fImg").value,
                description: document.getElementById("fDesc").value,
            };

            try {
                if (!editId) {
                    await fetch(`${API}/addproduct`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(payload)
                    });
                    showToast("Product added successfully");
                } else {
                    await fetch(`${API}/update/${editId}`, {
                        method: "PUT",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(payload)
                    });
                    showToast("Product updated");
                }
                closeFormModal();
                fetchAll();
            } catch {
                showToast("Operation failed", "error");
            }
        }

        // ── DELETE (với auth) ─────────────────────────────────────────
        async function confirmDelete() {
            if (!await checkAuth()) return;
            try {
                await fetch(`${API}/${deleteId}`, {
                    method: "DELETE",
                });
                showToast("Product removed");
                closeDeleteModal();
                fetchAll();
            } catch {
                showToast("Delete failed", "error");
            }
        }

        // Các function khác giữ nguyên (openAdd, openEdit, openView, etc...)
        function openAdd() {
            editId = null;
            document.getElementById("fName").value = "";
            document.getElementById("fPrice").value = "";
            document.getElementById("fQty").value = "";
            document.getElementById("fImg").value = "";
            document.getElementById("fDesc").value = "";
            document.getElementById("formTitle").textContent = "New Piece";
            document.getElementById("formSubtitle").textContent = "Add to catalog";
            document.getElementById("saveBtn").textContent = "Add to Catalog";
            document.getElementById("formOverlay").classList.add("active");
        }

        function openEdit(p) {
            editId = p.id;
            document.getElementById("fName").value = p.product_name || "";
            document.getElementById("fPrice").value = p.price || "";
            document.getElementById("fQty").value = p.quantity || "";
            document.getElementById("fImg").value = p.img || "";
            document.getElementById("fDesc").value = p.description || "";
            document.getElementById("formTitle").textContent = "Edit Piece";
            document.getElementById("formSubtitle").textContent = "Update details";
            document.getElementById("saveBtn").textContent = "Save Changes";
            document.getElementById("viewOverlay").classList.remove("active");
            document.getElementById("formOverlay").classList.add("active");
        }

        function closeFormModal() { document.getElementById("formOverlay").classList.remove("active"); }
        function closeViewModal() { document.getElementById("viewOverlay").classList.remove("active"); }
        function switchToEdit() { if (viewProduct) openEdit(viewProduct); }
        function openView(p) {
            viewProduct = p;
            document.getElementById("viewName").textContent = p.product_name;
            document.getElementById("viewPrice").textContent = "$" + Number(p.price).toLocaleString("en-US", { minimumFractionDigits: 2 });
            document.getElementById("viewDesc").textContent = p.description || "No description.";
            document.getElementById("viewQty").textContent = p.quantity + " units";
            document.getElementById("viewId").textContent = "#" + p.id;
            document.getElementById("viewImgWrap").innerHTML = p.img
                ? `<img id="viewImg" src="${p.img}" style="width:100%;height:260px;object-fit:cover;display:block"/>`
                : `<div class="view-img-placeholder" style="height:160px"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><rect x="3" y="10" width="18" height="8" rx="1"/><rect x="6" y="6" width="12" height="4" rx="1"/></svg></div>`;
            document.getElementById("viewOverlay").classList.add("active");
        }
        function openDelete(id, name) {
            deleteId = id;
            document.getElementById("deleteName").textContent = name;
            document.getElementById("deleteOverlay").classList.add("active");
        }
        function closeDeleteModal() { document.getElementById("deleteOverlay").classList.remove("active"); }
        function showToast(msg, type = "success") {
            const t = document.getElementById("toast");
            t.className = `toast show ${type}`;
            t.innerHTML = (type === "success" ? "✓ " : "✕ ") + msg;
            setTimeout(() => { t.className = "toast"; }, 3000);
        }

        // ── INIT (chờ DOM + check auth) ───────────────────────────────
        document.addEventListener('DOMContentLoaded', async function () {
            console.log("Main page loaded!");
            await fetchAll(); // Tự load products sau login
        });
    </script>
</body>

</html>
